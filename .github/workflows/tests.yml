name: Tests

on: [push, pull_request]

jobs:
  tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        php: [8.2, 8.3, 8.4]
        laravel: [10, 11, 12]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: dom, curl, libxml, mbstring, zip, pdo, sqlite, pdo_sqlite
          coverage: none

      - name: Install dependencies
        run: composer require "illuminate/support:^${{ matrix.laravel }}.0" "illuminate/console:^${{ matrix.laravel }}.0" "orchestra/testbench:^${{ matrix.laravel }}.0" --no-interaction --prefer-dist --update-with-all-dependencies

      - name: Run PHPUnit
        run: ./vendor/bin/phpunit

      - name: Run PHPStan
        run: ./vendor/bin/phpstan analyze

      - name: Run Pint
        run: ./vendor/bin/pint --test
