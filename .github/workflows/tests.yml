name: Tests

on: [push, pull_request]

jobs:
  tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # Laravel 10 — PHP 8.2 / 8.3 only (dropped in L11)
          - php: '8.2'
            laravel: '10'
            testbench: '^8.0'
          - php: '8.3'
            laravel: '10'
            testbench: '^8.0'
          # Laravel 11
          - php: '8.2'
            laravel: '11'
            testbench: '^9.0'
          - php: '8.3'
            laravel: '11'
            testbench: '^9.0'
          - php: '8.4'
            laravel: '11'
            testbench: '^9.0'
          # Laravel 12
          - php: '8.2'
            laravel: '12'
            testbench: '^10.0'
          - php: '8.3'
            laravel: '12'
            testbench: '^10.0'
          - php: '8.4'
            laravel: '12'
            testbench: '^10.0'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: dom, curl, libxml, mbstring, zip, pdo, sqlite, pdo_sqlite
          coverage: none

      - name: Install dependencies
        run: >
          composer require
          "illuminate/support:^${{ matrix.laravel }}.0"
          "illuminate/console:^${{ matrix.laravel }}.0"
          "orchestra/testbench:${{ matrix.testbench }}"
          --no-interaction --prefer-dist --update-with-all-dependencies

      - name: Run PHPUnit
        run: ./vendor/bin/phpunit

      - name: Run PHPStan
        run: ./vendor/bin/phpstan analyze

      - name: Run Pint
        run: ./vendor/bin/pint --test
